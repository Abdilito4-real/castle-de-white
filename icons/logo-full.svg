<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8dbb0"/>
      <stop offset="45%"  stop-color="#c8b87a"/>
      <stop offset="100%" stop-color="#8a7a40"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8dbb0"/>
      <stop offset="100%" stop-color="#c8b87a"/>
    </linearGradient>
  </defs>

  <!-- Background (transparent — remove rect for PNG export) -->
  <!-- <rect width="520" height="160" fill="#0e1a0e"/> -->

  <!-- ============ CASTLE MARK (left) ============ -->
  <!-- Base / foundation -->
  <rect x="14" y="106" width="92" height="38" fill="none" stroke="url(#goldGrad)" stroke-width="1.4"/>

  <!-- Battlements row -->
  <rect x="18"  y="84" width="14" height="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
  <rect x="36"  y="84" width="14" height="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
  <rect x="54"  y="84" width="14" height="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
  <rect x="72"  y="84" width="14" height="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
  <rect x="90"  y="84" width="14" height="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>

  <!-- Merlon gap fills (the gaps between battlements — dark) -->
  <rect x="32"  y="84" width="4" height="22" fill="#0e1a0e"/>
  <rect x="50"  y="84" width="4" height="22" fill="#0e1a0e"/>
  <rect x="68"  y="84" width="4" height="22" fill="#0e1a0e"/>
  <rect x="86"  y="84" width="4" height="22" fill="#0e1a0e"/>

  <!-- Central tower body -->
  <rect x="38" y="50" width="44" height="56" fill="none" stroke="url(#goldGrad)" stroke-width="1.4"/>

  <!-- Central tower window arch -->
  <rect x="50" y="62" width="20" height="26" fill="none" stroke="url(#goldGrad)" stroke-width="1.1"/>
  <path d="M50 62 Q60 52 70 62" fill="none" stroke="url(#goldGrad)" stroke-width="1.1"/>

  <!-- Tower battlement top -->
  <rect x="38" y="38" width="10" height="12" fill="none" stroke="url(#goldGrad)" stroke-width="1.1"/>
  <rect x="52" y="38" width="10" height="12" fill="none" stroke="url(#goldGrad)" stroke-width="1.1"/>
  <rect x="66" y="38" width="10" height="12" fill="none" stroke="url(#goldGrad)" stroke-width="1.1"/>
  <!-- gap fill -->
  <rect x="48" y="38" width="4"  height="12" fill="#0e1a0e"/>
  <rect x="62" y="38" width="4"  height="12" fill="#0e1a0e"/>
  <rect x="76" y="38" width="6"  height="12" fill="#0e1a0e"/>

  <!-- Spire / finial -->
  <polygon points="60,8 68,38 52,38" fill="none" stroke="url(#goldGrad)" stroke-width="1.3"/>
  <!-- Spire highlight line -->
  <line x1="60" y1="8" x2="60" y2="20" stroke="#e8dbb0" stroke-width="0.7" stroke-opacity="0.6"/>

  <!-- Flag at top -->
  <line x1="60" y1="8" x2="60" y2="3"  stroke="url(#goldGrad)" stroke-width="1"/>
  <polygon points="60,3 68,6 60,9" fill="#c8b87a" opacity="0.7"/>

  <!-- Door arch at base -->
  <rect x="50" y="118" width="20" height="26" fill="none" stroke="url(#goldGrad)" stroke-width="1.1"/>
  <path d="M50 118 Q60 110 70 118" fill="none" stroke="url(#goldGrad)" stroke-width="1.1"/>

  <!-- Side wing windows left -->
  <rect x="20" y="90" width="10" height="14" fill="none" stroke="url(#goldGrad)" stroke-width="0.9"/>
  <!-- Side wing windows right -->
  <rect x="90" y="90" width="10" height="14" fill="none" stroke="url(#goldGrad)" stroke-width="0.9"/>

  <!-- Decorative base line -->
  <line x1="6" y1="144" x2="114" y2="144" stroke="url(#goldGrad)" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- ============ WORDMARK (right) ============ -->
  <!-- "Castle de" — lighter weight, italic feel -->
  <text
    x="132" y="72"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="28"
    font-weight="400"
    font-style="italic"
    letter-spacing="1"
    fill="url(#goldGrad2)"
  >Castle de</text>

  <!-- "WHITE HOUSE" — strong display -->
  <text
    x="130" y="112"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="42"
    font-weight="600"
    letter-spacing="2"
    fill="url(#goldGrad)"
  >WHITE HOUSE</text>

  <!-- Tagline rule + text -->
  <line x1="132" y1="123" x2="510" y2="123" stroke="url(#goldGrad)" stroke-width="0.5" stroke-opacity="0.35"/>
  <text
    x="132" y="138"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="4.5"
    fill="#c8b87a"
    opacity="0.7"
  >KADUNA GRA  ·  EST. VICTORIAN ERA</text>
</svg>
