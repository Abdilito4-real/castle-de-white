<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8dbb0"/>
      <stop offset="100%" stop-color="#c8b87a"/>
    </linearGradient>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0e1a0e"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#c8b87a" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- ===== SIMPLIFIED CASTLE for favicon ===== -->
  <!-- Base -->
  <rect x="4"  y="22" width="24" height="8"  fill="none" stroke="url(#fg)" stroke-width="1.2"/>

  <!-- Central tower -->
  <rect x="10" y="13" width="12" height="17" fill="none" stroke="url(#fg)" stroke-width="1.2"/>

  <!-- Battlements — 3 merlons -->
  <rect x="10" y="9"  width="3"  height="4"  fill="url(#fg)"/>
  <rect x="15" y="9"  width="3"  height="4"  fill="url(#fg)"/>
  <rect x="20" y="9"  width="3"  height="4"  fill="url(#fg)"/>

  <!-- Spire -->
  <polygon points="16,3 20,9 12,9" fill="url(#fg)"/>

  <!-- Door arch -->
  <rect x="13" y="25" width="6"  height="5"  fill="none" stroke="url(#fg)" stroke-width="0.9"/>
  <path d="M13 25 Q16 21.5 19 25" fill="none" stroke="url(#fg)" stroke-width="0.9"/>

  <!-- Side walls -->
  <rect x="4"  y="18" width="6"  height="12" fill="none" stroke="url(#fg)" stroke-width="1"/>
  <rect x="22" y="18" width="6"  height="12" fill="none" stroke="url(#fg)" stroke-width="1"/>

  <!-- Side merlon left -->
  <rect x="4"  y="14" width="3" height="4" fill="url(#fg)"/>
  <rect x="8"  y="14" width="2" height="4" fill="url(#fg)"/>
  <!-- Side merlon right -->
  <rect x="21" y="14" width="2" height="4" fill="url(#fg)"/>
  <rect x="25" y="14" width="3" height="4" fill="url(#fg)"/>
</svg>
