<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8dbb0"/>
      <stop offset="50%"  stop-color="#c8b87a"/>
      <stop offset="100%" stop-color="#8a7a40"/>
    </linearGradient>
    <linearGradient id="gg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a3020"/>
      <stop offset="100%" stop-color="#0e1a0e"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8dbb0"/>
      <stop offset="100%" stop-color="#c8b87a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#gg2)"/>
  <!-- Subtle texture rings -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="#c8b87a" stroke-width="0.8" stroke-opacity="0.18"/>
  <circle cx="96" cy="96" r="80" fill="none" stroke="#c8b87a" stroke-width="0.4" stroke-opacity="0.1"/>

  <!-- ===== CASTLE ===== -->
  <!-- Foundation / base -->
  <rect x="22" y="130" width="148" height="42" rx="2" fill="none" stroke="url(#gg)" stroke-width="2"/>

  <!-- Left wing -->
  <rect x="22"  y="96" width="34" height="76" fill="none" stroke="url(#gg)" stroke-width="1.8"/>
  <!-- Left wing battlements -->
  <rect x="22"  y="82" width="10" height="14" fill="none" stroke="url(#gg)" stroke-width="1.5"/>
  <rect x="35"  y="82" width="10" height="14" fill="none" stroke="url(#gg)" stroke-width="1.5"/>
  <rect x="46"  y="82" width="10" height="14" fill="none" stroke="url(#gg)" stroke-width="1.5"/>
  <!-- gap fill -->
  <rect x="32"  y="82" width="3"  height="14" fill="#0e1a0e"/>
  <rect x="45"  y="82" width="1"  height="14" fill="#0e1a0e"/>
  <rect x="56"  y="82" width="8"  height="14" fill="#0e1a0e"/>
  <!-- Left wing window -->
  <rect x="30"  y="110" width="18" height="16" fill="none" stroke="url(#gg)" stroke-width="1.2"/>
  <path d="M30 110 Q39 102 48 110" fill="none" stroke="url(#gg)" stroke-width="1.2"/>

  <!-- Right wing -->
  <rect x="136" y="96" width="34" height="76" fill="none" stroke="url(#gg)" stroke-width="1.8"/>
  <!-- Right wing battlements -->
  <rect x="136" y="82" width="10" height="14" fill="none" stroke="url(#gg)" stroke-width="1.5"/>
  <rect x="149" y="82" width="10" height="14" fill="none" stroke="url(#gg)" stroke-width="1.5"/>
  <rect x="162" y="82" width="8"  height="14" fill="none" stroke="url(#gg)" stroke-width="1.5"/>
  <!-- gap fill -->
  <rect x="128" y="82" width="8"  height="14" fill="#0e1a0e"/>
  <rect x="146" y="82" width="3"  height="14" fill="#0e1a0e"/>
  <rect x="159" y="82" width="3"  height="14" fill="#0e1a0e"/>
  <!-- Right wing window -->
  <rect x="144" y="110" width="18" height="16" fill="none" stroke="url(#gg)" stroke-width="1.2"/>
  <path d="M144 110 Q153 102 162 110" fill="none" stroke="url(#gg)" stroke-width="1.2"/>

  <!-- Central tower body -->
  <rect x="60"  y="68" width="72" height="104" fill="none" stroke="url(#gg)" stroke-width="2"/>

  <!-- Central tower battlements -->
  <rect x="60"  y="52" width="12" height="16" fill="none" stroke="url(#gg)" stroke-width="1.6"/>
  <rect x="76"  y="52" width="12" height="16" fill="none" stroke="url(#gg)" stroke-width="1.6"/>
  <rect x="92"  y="52" width="12" height="16" fill="none" stroke="url(#gg)" stroke-width="1.6"/>
  <rect x="108" y="52" width="12" height="16" fill="none" stroke="url(#gg)" stroke-width="1.6"/>
  <rect x="120" y="52" width="12" height="16" fill="none" stroke="url(#gg)" stroke-width="1.6"/>
  <!-- gap covers -->
  <rect x="72"  y="52" width="4"  height="16" fill="#0e1a0e"/>
  <rect x="88"  y="52" width="4"  height="16" fill="#0e1a0e"/>
  <rect x="104" y="52" width="4"  height="16" fill="#0e1a0e"/>
  <rect x="120" y="52" width="0"  height="16" fill="#0e1a0e"/>

  <!-- Central tower spire -->
  <polygon points="96,14 110,52 82,52" fill="none" stroke="url(#goldV)" stroke-width="2"/>
  <!-- Spire centre line -->
  <line x1="96" y1="14" x2="96" y2="30" stroke="#e8dbb0" stroke-width="1" opacity="0.5"/>
  <!-- Flag -->
  <polygon points="96,14 110,19 96,24" fill="#c8b87a" opacity="0.85"/>

  <!-- Tower main window (pointed arch) -->
  <rect x="74"  y="84" width="44" height="44" fill="none" stroke="url(#gg)" stroke-width="1.6"/>
  <path d="M74 84 Q96 64 118 84" fill="none" stroke="url(#gg)" stroke-width="1.6"/>
  <!-- Inner window detail -->
  <line x1="96" y1="84" x2="96" y2="128" stroke="url(#gg)" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="74" y1="106" x2="118" y2="106" stroke="url(#gg)" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Door arch at base -->
  <rect x="78"  y="144" width="36" height="30" fill="none" stroke="url(#gg)" stroke-width="1.6"/>
  <path d="M78 144 Q96 130 114 144" fill="none" stroke="url(#gg)" stroke-width="1.6"/>

  <!-- Decorative base line -->
  <line x1="22" y1="172" x2="170" y2="172" stroke="url(#gg)" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Corner ornament dots -->
  <circle cx="22"  cy="172" r="2.5" fill="#c8b87a" opacity="0.5"/>
  <circle cx="96"  cy="176" r="2.5" fill="#c8b87a" opacity="0.5"/>
  <circle cx="170" cy="172" r="2.5" fill="#c8b87a" opacity="0.5"/>
</svg>
