<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <!-- Same as logo-full but on transparent background, gold on transparent -->
  <defs>
    <linearGradient id="goldW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8dbb0"/>
      <stop offset="50%"  stop-color="#c8b87a"/>
      <stop offset="100%" stop-color="#8a7a40"/>
    </linearGradient>
    <linearGradient id="goldWV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8dbb0"/>
      <stop offset="100%" stop-color="#c8b87a"/>
    </linearGradient>
  </defs>

  <!-- Castle mark -->
  <rect x="14" y="106" width="92" height="38" fill="none" stroke="url(#goldW)" stroke-width="1.4"/>
  <rect x="18"  y="84" width="14" height="22" fill="none" stroke="url(#goldW)" stroke-width="1.2"/>
  <rect x="36"  y="84" width="14" height="22" fill="none" stroke="url(#goldW)" stroke-width="1.2"/>
  <rect x="54"  y="84" width="14" height="22" fill="none" stroke="url(#goldW)" stroke-width="1.2"/>
  <rect x="72"  y="84" width="14" height="22" fill="none" stroke="url(#goldW)" stroke-width="1.2"/>
  <rect x="90"  y="84" width="14" height="22" fill="none" stroke="url(#goldW)" stroke-width="1.2"/>
  <rect x="38"  y="50" width="44" height="56" fill="none" stroke="url(#goldW)" stroke-width="1.4"/>
  <rect x="50"  y="62" width="20" height="26" fill="none" stroke="url(#goldW)" stroke-width="1.1"/>
  <path d="M50 62 Q60 52 70 62" fill="none" stroke="url(#goldW)" stroke-width="1.1"/>
  <rect x="38"  y="38" width="10" height="12" fill="none" stroke="url(#goldW)" stroke-width="1.1"/>
  <rect x="52"  y="38" width="10" height="12" fill="none" stroke="url(#goldW)" stroke-width="1.1"/>
  <rect x="66"  y="38" width="10" height="12" fill="none" stroke="url(#goldW)" stroke-width="1.1"/>
  <polygon points="60,8 68,38 52,38" fill="none" stroke="url(#goldWV)" stroke-width="1.3"/>
  <polygon points="60,3 68,6 60,9" fill="#c8b87a" opacity="0.7"/>
  <rect x="50"  y="118" width="20" height="26" fill="none" stroke="url(#goldW)" stroke-width="1.1"/>
  <path d="M50 118 Q60 110 70 118" fill="none" stroke="url(#goldW)" stroke-width="1.1"/>

  <!-- Wordmark -->
  <text x="132" y="72"
    font-family="'Playfair Display','Georgia',serif"
    font-size="28" font-weight="400" font-style="italic" letter-spacing="1"
    fill="url(#goldWV)">Castle de</text>
  <text x="130" y="112"
    font-family="'Playfair Display','Georgia',serif"
