<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a3020"/>
      <stop offset="100%" stop-color="#080f08"/>
    </linearGradient>
    <linearGradient id="gold512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8dbb0"/>
      <stop offset="45%"  stop-color="#c8b87a"/>
      <stop offset="100%" stop-color="#8a7a40"/>
    </linearGradient>
    <linearGradient id="goldV512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8dbb0"/>
      <stop offset="100%" stop-color="#c8b87a"/>
    </linearGradient>
    <radialGradient id="glow512" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#1a3020" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg512)"/>
  <!-- Glow overlay -->
  <rect width="512" height="512" rx="96" fill="url(#glow512)"/>
  <!-- Border rings -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#c8b87a" stroke-width="2"  stroke-opacity="0.2"/>
  <rect x="16" y="16" width="480" height="480" rx="82" fill="none" stroke="#c8b87a" stroke-width="1" stroke-opacity="0.1"/>

  <!-- ===== CASTLE ===== -->
  <!-- Foundation -->
  <rect x="56"  y="354" width="400" height="108" rx="4" fill="none" stroke="url(#gold512)" stroke-width="3.5"/>

  <!-- Left wing -->
  <rect x="56"  y="254" width="88" height="208" fill="none" stroke="url(#gold512)" stroke-width="3"/>
  <!-- Left wing battlements -->
  <rect x="56"  y="222" width="24" height="32" fill="none" stroke="url(#gold512)" stroke-width="2.5"/>
  <rect x="86"  y="222" width="24" height="32" fill="none" stroke="url(#gold512)" stroke-width="2.5"/>
  <rect x="116" y="222" width="24" height="32" fill="none" stroke="url(#gold512)" stroke-width="2.5"/>
  <rect x="80"  y="222" width="6"  height="32" fill="#0e1a0e"/>
  <rect x="110" y="222" width="6"  height="32" fill="#0e1a0e"/>
  <rect x="140" y="222" width="16" height="32" fill="#0e1a0e"/>
  <!-- Left window -->
  <rect x="74"  y="286" width="52" height="48" fill="none" stroke="url(#gold512)" stroke-width="2.5"/>
  <path d="M74 286 Q100 264 126 286" fill="none" stroke="url(#gold512)" stroke-width="2.5"/>

  <!-- Right wing -->
  <rect x="368" y="254" width="88" height="208" fill="none" stroke="url(#gold512)" stroke-width="3"/>
  <!-- Right wing battlements -->
  <rect x="368" y="222" width="24" height="32" fill="none" stroke="url(#gold512)" stroke-width="2.5"/>
  <rect x="398" y="222" width="24" height="32" fill="none" stroke="url(#gold512)" stroke-width="2.5"/>
  <rect x="428" y="222" width="28" height="32" fill="none" stroke="url(#gold512)" stroke-width="2.5"/>
  <rect x="356" y="222" width="12" height="32" fill="#0e1a0e"/>
  <rect x="392" y="222" width="6"  height="32" fill="#0e1a0e"/>
  <rect x="422" y="222" width="6"  height="32" fill="#0e1a0e"/>
  <!-- Right window -->
  <rect x="386" y="286" width="52" height="48" fill="none" stroke="url(#gold512)" stroke-width="2.5"/>
  <path d="M386 286 Q412 264 438 286" fill="none" stroke="url(#gold512)" stroke-width="2.5"/>

  <!-- Central tower -->
  <rect x="160" y="178" width="192" height="284" fill="none" stroke="url(#gold512)" stroke-width="3.5"/>

  <!-- Central tower battlements -->
  <rect x="160" y="140" width="32" height="38" fill="none" stroke="url(#gold512)" stroke-width="2.8"/>
  <rect x="200" y="140" width="32" height="38" fill="none" stroke="url(#gold512)" stroke-width="2.8"/>
  <rect x="240" y="140" width="32" height="38" fill="none" stroke="url(#gold512)" stroke-width="2.8"/>
  <rect x="280" y="140" width="32" height="38" fill="none" stroke="url(#gold512)" stroke-width="2.8"/>
  <rect x="320" y="140" width="32" height="38" fill="none" stroke="url(#gold512)" stroke-width="2.8"/>
  <!-- gap covers -->
  <rect x="192" y="140" width="8"  height="38" fill="#0e1a0e"/>
  <rect x="232" y="140" width="8"  height="38" fill="#0e1a0e"/>
  <rect x="272" y="140" width="8"  height="38" fill="#0e1a0e"/>
  <rect x="312" y="140" width="8"  height="38" fill="#0e1a0e"/>
  <rect x="352" y="140" width="8"  height="38" fill="#0e1a0e"/>

  <!-- Central tower spire -->
  <polygon points="256,32 286,140 226,140" fill="none" stroke="url(#goldV512)" stroke-width="3"/>
  <line x1="256" y1="32" x2="256" y2="72" stroke="#e8dbb0" stroke-width="1.5" opacity="0.45"/>
  <!-- Flag -->
  <polygon points="256,32 286,42 256,52" fill="#c8b87a" opacity="0.85"/>

  <!-- Tower window (pointed arch, large) -->
  <rect x="192" y="210" width="128" height="128" fill="none" stroke="url(#gold512)" stroke-width="2.8"/>
  <path d="M192 210 Q256 158 320 210" fill="none" stroke="url(#gold512)" stroke-width="2.8"/>
  <!-- Tracery cross detail -->
  <line x1="256" y1="210" x2="256" y2="338" stroke="url(#gold512)" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="192" y1="274" x2="320" y2="274" stroke="url(#gold512)" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- Door arch at base -->
  <rect x="210" y="380" width="92" height="82" fill="none" stroke="url(#gold512)" stroke-width="2.8"/>
  <path d="M210 380 Q256 346 302 380" fill="none" stroke="url(#gold512)" stroke-width="2.8"/>

  <!-- Decorative base line + ornaments -->
  <line x1="56" y1="462" x2="456" y2="462" stroke="url(#gold512)" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="56"  cy="462" r="5" fill="#c8b87a" opacity="0.45"/>
  <circle cx="256" cy="466" r="5" fill="#c8b87a" opacity="0.45"/>
  <circle cx="456" cy="462" r="5" fill="#c8b87a" opacity="0.45"/>

  <!-- Monogram "CW" subtle at bottom -->
  <text x="256" y="492" text-anchor="middle"
    font-family="'Playfair Display','Georgia',serif"
    font-size="20" font-weight="600" letter-spacing="8"
    fill="#c8b87a" opacity="0.35">C·W·H</text>
</svg>
