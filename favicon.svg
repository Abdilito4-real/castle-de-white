<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a0e"/>
      <stop offset="100%" stop-color="#1a2d1a"/>
    </linearGradient>
    <linearGradient id="wG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#c8d8c8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" fill="url(#bgF)"/>
  <!-- Corner marks -->
  <line x1="1" y1="1" x2="6"  y2="1"  stroke="#c8b87a" stroke-width="0.8" opacity="0.7"/>
  <line x1="1" y1="1" x2="1"  y2="6"  stroke="#c8b87a" stroke-width="0.8" opacity="0.7"/>
  <line x1="31" y1="1" x2="26" y2="1" stroke="#c8b87a" stroke-width="0.8" opacity="0.7"/>
  <line x1="31" y1="1" x2="31" y2="6" stroke="#c8b87a" stroke-width="0.8" opacity="0.7"/>
  <line x1="1" y1="31" x2="6"  y2="31" stroke="#c8b87a" stroke-width="0.8" opacity="0.7"/>
  <line x1="1" y1="31" x2="1"  y2="26" stroke="#c8b87a" stroke-width="0.8" opacity="0.7"/>
  <line x1="31" y1="31" x2="26" y2="31" stroke="#c8b87a" stroke-width="0.8" opacity="0.7"/>
  <line x1="31" y1="31" x2="31" y2="26" stroke="#c8b87a" stroke-width="0.8" opacity="0.7"/>
  <!-- Castle silhouette -->
  <rect x="7" y="18" width="18" height="9" fill="none" stroke="#c8b87a" stroke-width="0.7" opacity="0.8"/>
  <!-- Battlements -->
  <rect x="7"  y="14" width="3" height="4" fill="none" stroke="#c8b87a" stroke-width="0.7" opacity="0.8"/>
  <rect x="12" y="14" width="3" height="4" fill="none" stroke="#c8b87a" stroke-width="0.7" opacity="0.8"/>
  <rect x="17" y="14" width="3" height="4" fill="none" stroke="#c8b87a" stroke-width="0.7" opacity="0.8"/>
  <rect x="22" y="14" width="3" height="4" fill="none" stroke="#c8b87a" stroke-width="0.7" opacity="0.8"/>
  <!-- Tower -->
  <rect x="13" y="10" width="6" height="8" fill="none" stroke="#c8b87a" stroke-width="0.7" opacity="0.9"/>
  <polygon points="16,6 19,10 13,10" fill="#c8b87a" opacity="0.7"/>
  <!-- Door -->
  <rect x="14.5" y="22" width="3" height="5" fill="none" stroke="#c8b87a" stroke-width="0.5" opacity="0.6"/>
  <!-- CW lettermark -->
  <text x="9" y="10" font-family="Georgia,serif" font-size="5.5" font-style="italic" fill="#c8b87a" opacity="0.85" letter-spacing="0.3">CW</text>
</svg>
