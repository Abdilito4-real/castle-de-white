  <rect x="67" y="93"  width="16" height="15" fill="none" stroke="url(#gold192)" stroke-width="1.1" opacity="0.8"/>
  <rect x="88" y="93"  width="16" height="15" fill="none" stroke="url(#gold192)" stroke-width="1.1" opacity="0.8"/>
  <rect x="109" y="93" width="16" height="15" fill="none" stroke="url(#gold192)" stroke-width="1.1" opacity="0.8"/>
  <rect x="130" y="93" width="16" height="15" fill="none" stroke="url(#gold192)" stroke-width="1.1" opacity="0.8"/>
